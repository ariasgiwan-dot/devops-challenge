name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: testcreateread
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: testcreateread/devops-challenge:latest

  deploy:
    runs-on: self-hosted
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and load image into Kind
        run: |
          docker pull testcreateread/devops-challenge:latest
          kind load docker-image testcreateread/devops-challenge:latest --name devops-challenge

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres-secret.yaml
          kubectl apply -f k8s/postgres.yaml
          kubectl apply -f k8s/backend.yaml

      - name: Update image
        run: |
          kubectl set image deployment/backend \
            backend=testcreateread/devops-challenge:latest \
            -n devops-challenge

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend -n devops-challenge --timeout=120s

      - name: Verify deployment
        run: |
          kubectl get pods -n devops-challenge
          kubectl get svc -n devops-challenge
